<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理端 | Meteor Design Queue</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <main class="page">
    <section id="loginBox" class="card login-card">
      <h1 style="margin:0 0 8px">管理端登录</h1>
      <p class="desc">密码输入框隐藏显示，不会明文展示。</p>
      <div class="input-row">
        <label for="passwordInput">管理密码</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入管理密码" />
      </div>
      <button class="btn-main" style="width:100%; margin-top:16px" id="loginBtn">登录</button>
      <p id="loginMsg" class="small"></p>
    </section>

    <section id="adminPanel" style="display:none">
      <div class="admin-top">
        <div>
          <h1 style="margin:0 0 8px">设计叫号管理</h1>
          <p class="desc">每个设计师可独立叫号、完成、作废、暂停接单或恢复接单。</p>
        </div>
        <div class="admin-actions">
          <button class="btn-muted" id="refreshBtn">刷新</button>
          <button class="btn-warn" id="resetNumberBtn">重置今日号码</button>
          <button class="btn-danger" id="clearTodayBtn">清空今日测试数据</button>
          <button class="btn-muted" id="logoutBtn">退出</button>
        </div>
      </div>

      <section class="card">
        <div class="admin-stat-grid" id="adminStats"></div>
      </section>

      <section class="card" style="margin-top:16px">
        <h2 style="margin:0 0 6px">设计师名称设置</h2>
        <p class="desc">测试或正式使用时可改成真实设计师姓名。</p>
        <div class="grid-2" style="margin-top:14px">
          <div class="input-row" style="margin:0"><label>设计师 1</label><input id="designerNameA" /></div>
          <div class="input-row" style="margin:0"><label>设计师 2</label><input id="designerNameB" /></div>
        </div>
        <button class="btn-main" style="margin-top:14px" id="saveNamesBtn">保存名称</button>
      </section>

      <section id="adminDesignerPanels"></section>

      <section class="card" style="margin-top:16px">
        <div class="admin-designer-head" style="margin-bottom:8px">
          <div>
            <h2 style="margin:0 0 8px">本月统计</h2>
            <p class="desc">红框部分可手动填写；完成率会根据“已完成 ÷ 本月接单”自动计算。</p>
          </div>
          <button class="btn-main" id="saveMonthStatsBtn">保存本月统计</button>
        </div>
        <div id="monthStats" style="margin-top:14px"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./src/config.js"></script>
  <script src="./src/app.js"></script>
  <script>window.MeteorApp.startAdmin();</script>
</body>
</html>
